image: alpine/edge
oauth: pages.sr.ht/PAGES:RW

packages:
  - hut

sources:
  - https://git.sr.ht/~ccleberg/Hutch

environment:
  site: hutch.cleberg.net

tasks:
  - package-site: |
      set -euo pipefail
      cd Hutch/website
      tar -cvz . > ../../site.tar.gz

  - upload-site: |
      set -euo pipefail
      hut pages publish -d "$site" site.tar.gz
